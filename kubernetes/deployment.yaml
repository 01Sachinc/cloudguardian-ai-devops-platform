apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-app
  labels:
    app: ai-devops-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-devops-app
  template:
    metadata:
      labels:
        app: ai-devops-app
    spec:
      containers:
      - name: ai-devops-app
        image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_HOST
