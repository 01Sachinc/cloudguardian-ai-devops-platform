apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-devops-app-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - app.ai-devops-platform.com
    secretName: ai-devops-tls-secret
  rules:
  - host: app.ai-devops-platform.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-devops-app-service
            port:
              number: 80
